<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>國教盟知識王 🎯</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

:root {
  --primary: #3D4451;
  --primary-light: #4F5666;
  --accent: #E86E4E;
  --accent-dark: #D15A3A;
  --accent-light: #F5A623;
  --bg: #F8F9FA;
  --success: #10B981;
  --wrong: #EF4444;
  --gold: #FFD700;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  color: white;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

html { height: -webkit-fill-available; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
}

/* 粒子背景 */
.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.particle {
  position: absolute;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  animation: float 15s infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* ==================== 開始畫面 ==================== */
.start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  text-align: center;
  position: relative;
  z-index: 1;
  padding: 20px;
}

.logo {
  font-size: 5rem;
  margin-bottom: 0.5rem;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.title {
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: 900;
  margin-bottom: 0.5rem;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: clamp(0.9rem, 3vw, 1.5rem);
  opacity: 0.9;
  margin-bottom: 2rem;
}

.start-btn {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: white;
  border: none;
  padding: 1.25rem 3rem;
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  font-weight: 700;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  box-shadow: 0 10px 40px rgba(232,110,78,0.4);
  position: relative;
  overflow: hidden;
}

.start-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shine 2s infinite;
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 100%; }
}

.start-btn:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 15px 50px rgba(232,110,78,0.5);
}

.start-btn:active { transform: scale(0.98); }

.stats-preview {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-item {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 1rem 1.5rem;
  border-radius: 16px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}

.stat-num {
  font-size: clamp(1.5rem, 5vw, 2rem);
  font-weight: 900;
  color: var(--accent);
}

.stat-label { font-size: 0.8rem; opacity: 0.8; }

/* 音效控制 */
.sound-toggle {
  position: fixed;
  top: 20px; right: 20px;
  background: rgba(255,255,255,0.15);
  border: none;
  width: 50px; height: 50px;
  border-radius: 50%;
  font-size: 1.5rem;
  cursor: pointer;
  z-index: 1000;
  transition: all 0.3s;
}

.sound-toggle:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.1);
}

/* ==================== 遊戲畫面 ==================== */
.game-screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  position: relative;
  z-index: 1;
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 0;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.progress-info {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.question-num {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  padding: 0.5rem 1rem;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.9rem;
}

.timer-container {
  position: relative;
  width: 60px; height: 60px;
}

.timer-ring { transform: rotate(-90deg); }

.timer-ring circle {
  fill: none;
  stroke-width: 4;
}

.timer-ring .bg { stroke: rgba(255,255,255,0.2); }
.timer-ring .progress {
  stroke: var(--accent);
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear;
}

.timer-ring.warning .progress { stroke: #FCD34D; }
.timer-ring.danger .progress { stroke: var(--wrong); }

.timer-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.25rem;
  font-weight: 900;
}

.timer-text.danger {
  animation: pulse 0.5s infinite;
  color: var(--wrong);
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
}

.score-display {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 0.5rem 1rem;
  border-radius: 12px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}

.score-label { font-size: 0.75rem; opacity: 0.8; }
.score-num { font-size: 1.25rem; font-weight: 900; color: var(--gold); }

/* Combo 顯示 */
.combo {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 4rem;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.8);
  animation: comboAnim 1s forwards;
  pointer-events: none;
  z-index: 100;
}

@keyframes comboAnim {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}

/* 題目區 */
.question-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.category-tag {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 0.4rem 1.25rem;
  border-radius: 20px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  animation: fadeInDown 0.5s;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.question-text {
  font-size: clamp(1.25rem, 5vw, 2.25rem);
  font-weight: 700;
  text-align: center;
  line-height: 1.5;
  max-width: 900px;
  margin-bottom: 2rem;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  animation: fadeIn 0.5s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* 選項 */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  width: 100%;
  max-width: 700px;
}

.option-btn {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.2);
  color: white;
  padding: 1rem 1.25rem;
  font-size: clamp(0.95rem, 3vw, 1.15rem);
  font-weight: 600;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  animation: optionIn 0.4s backwards;
}

.option-btn:nth-child(1) { animation-delay: 0.1s; }
.option-btn:nth-child(2) { animation-delay: 0.2s; }
.option-btn:nth-child(3) { animation-delay: 0.3s; }
.option-btn:nth-child(4) { animation-delay: 0.4s; }

@keyframes optionIn {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}

.option-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.25);
  transform: translateX(5px);
  border-color: var(--accent);
}

.option-btn:active:not(:disabled) { transform: scale(0.98); }
.option-btn:disabled { cursor: not-allowed; }

.option-btn.correct {
  background: var(--success) !important;
  border-color: var(--success) !important;
  animation: correctPop 0.5s;
}

.option-btn.wrong {
  background: var(--wrong) !important;
  border-color: var(--wrong) !important;
  opacity: 0.6;
}

@keyframes correctPop {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

.option-letter {
  background: rgba(255,255,255,0.2);
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  flex-shrink: 0;
  font-size: 0.9rem;
}

/* ==================== 答案揭曉 ==================== */
.answer-reveal {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 1.5rem;
  flex: 1;
  animation: fadeIn 0.5s;
}

.reveal-icon {
  font-size: 5rem;
  margin-bottom: 0.5rem;
  animation: popIn 0.5s;
}

@keyframes popIn {
  0% { transform: scale(0) rotate(-180deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.reveal-text {
  font-size: clamp(1.5rem, 6vw, 2.5rem);
  font-weight: 900;
  margin-bottom: 0.5rem;
}

.reveal-roast {
  font-size: clamp(1rem, 4vw, 1.25rem);
  opacity: 0.95;
  margin-bottom: 1rem;
  padding: 0.75rem 1.5rem;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  max-width: 500px;
  border-left: 4px solid var(--accent);
}

.reveal-detail {
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  opacity: 0.85;
  max-width: 600px;
  margin: 0 auto 1.5rem;
  line-height: 1.6;
  padding: 1rem;
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
}

.next-btn {
  background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
  color: var(--primary);
  border: none;
  padding: 1rem 2.5rem;
  font-size: clamp(1rem, 4vw, 1.25rem);
  font-weight: 700;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.next-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.next-btn:active { transform: scale(0.98); }

/* ==================== 結束畫面 ==================== */
.end-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  text-align: center;
  position: relative;
  z-index: 1;
  padding: 20px;
}

.confetti {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.end-icon {
  font-size: 6rem;
  margin-bottom: 0.5rem;
  animation: bounce 1s infinite;
}

.end-title {
  font-size: clamp(2rem, 8vw, 3.5rem);
  font-weight: 900;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, var(--gold) 0%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.end-score {
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: 900;
  color: var(--accent);
  margin: 0.5rem 0;
  text-shadow: 0 0 30px rgba(232,110,78,0.5);
}

.end-message {
  font-size: clamp(1rem, 4vw, 1.5rem);
  opacity: 0.9;
  margin-bottom: 2rem;
  padding: 1rem 2rem;
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
}

.restart-btn {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: white;
  border: none;
  padding: 1rem 2.5rem;
  font-size: clamp(1rem, 4vw, 1.25rem);
  font-weight: 700;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  box-shadow: 0 10px 30px rgba(232,110,78,0.4);
}

.restart-btn:hover { transform: scale(1.05); }

/* 主持人控制列 */
.host-controls {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding: 0.6rem 1.25rem;
  border-radius: 30px;
  display: flex;
  gap: 1rem;
  align-items: center;
  font-size: 0.8rem;
  z-index: 100;
  border: 1px solid rgba(255,255,255,0.1);
}

.host-controls kbd {
  background: var(--accent);
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  font-family: inherit;
  font-weight: 700;
}

/* 進度條 */
.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 4px;
  background: var(--accent);
  transition: width 0.3s;
  z-index: 1000;
}

/* 閃光特效 */
.screen-flash {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  animation: flashAnim 0.5s forwards;
}

.screen-flash.success { background: radial-gradient(circle, rgba(16,185,129,0.4) 0%, transparent 70%); }
.screen-flash.wrong { background: radial-gradient(circle, rgba(239,68,68,0.4) 0%, transparent 70%); }
.screen-flash.warning { background: radial-gradient(circle, rgba(252,211,77,0.4) 0%, transparent 70%); }

@keyframes flashAnim {
  0% { opacity: 0; }
  30% { opacity: 1; }
  100% { opacity: 0; }
}

/* 震動特效 */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
  20%, 40%, 60%, 80% { transform: translateX(5px); }
}

body.shake { animation: shake 0.5s; }

/* 星星爆炸 */
.stars-burst {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 100;
}

.star {
  position: absolute;
  font-size: 2rem;
  animation: starBurst 0.8s forwards;
}

@keyframes starBurst {
  0% { transform: translate(0, 0) scale(0); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
}

/* 響應式 */
@media (max-width: 768px) {
  .options-grid { grid-template-columns: 1fr; gap: 0.6rem; }
  .option-btn { padding: 0.9rem 1rem; }
  .host-controls { display: none; }
  .timer-container { width: 50px; height: 50px; }
  .timer-text { font-size: 1rem; }
  .stat-item { padding: 0.75rem 1rem; }
  .logo { font-size: 4rem; }
  .reveal-icon { font-size: 4rem; }
  .end-icon { font-size: 5rem; }
}

@media (max-width: 380px) {
  .container { padding: 10px; }
  .question-text { font-size: 1.1rem; }
  .option-btn { padding: 0.75rem; font-size: 0.9rem; }
  .option-letter { width: 30px; height: 30px; font-size: 0.8rem; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<div class="particles" id="particles"></div>
<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

<!-- 開始畫面 -->
<div class="start-screen" id="startScreen">
  <div class="logo">🎯</div>
  <h1 class="title">國教盟知識王</h1>
  <p class="subtitle">第四屆會員大會 ｜ 三年倡議回顧挑戰</p>
  <button class="start-btn" onclick="startGame()">🚀 開始挑戰！</button>
  <div class="stats-preview">
    <div class="stat-item">
      <div class="stat-num">15</div>
      <div class="stat-label">道題目</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">113</div>
      <div class="stat-label">篇新聞稿</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">7917</div>
      <div class="stat-label">則媒體聲量</div>
    </div>
  </div>
</div>

<!-- 遊戲畫面 -->
<div class="game-screen" id="gameScreen">
  <div class="game-header">
    <div class="progress-info">
      <span class="question-num" id="questionNum">第 1 / 15 題</span>
      <div class="timer-container">
        <svg class="timer-ring" id="timerRing" width="60" height="60" viewBox="0 0 60 60">
          <circle class="bg" cx="30" cy="30" r="26"/>
          <circle class="progress" id="timerProgress" cx="30" cy="30" r="26" 
                  stroke-dasharray="163.36" stroke-dashoffset="0"/>
        </svg>
        <span class="timer-text" id="timer">15</span>
      </div>
    </div>
    <div class="score-display">
      <div class="score-label">得分</div>
      <div class="score-num" id="score">0</div>
    </div>
  </div>
  
  <div class="question-area" id="questionArea">
    <div class="category-tag" id="category">數據題</div>
    <div class="question-text" id="questionText">題目載入中...</div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
  
  <div class="answer-reveal" id="answerReveal">
    <div class="reveal-icon" id="revealIcon">✅</div>
    <div class="reveal-text" id="revealText">答對了！</div>
    <div class="reveal-roast" id="revealRoast"></div>
    <div class="reveal-detail" id="revealDetail">補充說明...</div>
    <button class="next-btn" onclick="nextQuestion()">下一題 →</button>
  </div>
</div>

<!-- 結束畫面 -->
<div class="end-screen" id="endScreen">
  <canvas class="confetti" id="confetti"></canvas>
  <div class="end-icon" id="endIcon">🏆</div>
  <h1 class="end-title">挑戰完成！</h1>
  <div class="end-score" id="finalScore">0 / 15</div>
  <p class="end-message" id="endMessage">你是國教盟資深會員！</p>
  <button class="restart-btn" onclick="restartGame()">🔄 再玩一次</button>
</div>

<!-- 主持人控制 -->
<div class="host-controls" id="hostControls">
  <span><kbd>空白鍵</kbd> 揭曉</span>
  <span><kbd>→</kbd> 下一題</span>
  <span><kbd>R</kbd> 重來</span>
</div>

<script>
// ==================== 音效系統 ====================
let audioCtx = null;
let soundEnabled = true;
let bgmInterval = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  switch(type) {
    case 'correct':
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
      break;
    case 'wrong':
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
      break;
    case 'tick':
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
      osc.start(audioCtx.currentTime);

      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
      break;
    case 'start':
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.1 + 0.3);
        o.start(audioCtx.currentTime + i * 0.1);
        o.stop(audioCtx.currentTime + i * 0.1 + 0.3);
      });
      break;
    case 'win':
      [523, 659, 784, 1047, 784, 1047].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.12);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.12 + 0.3);

function startBGM() {
  if (!soundEnabled || !audioCtx || bgmInterval) return;
  bgmInterval = setInterval(() => {
    if (!soundEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    const kick = audioCtx.createOscillator();
    const kickGain = audioCtx.createGain();
    kick.connect(kickGain); kickGain.connect(audioCtx.destination);
    kick.frequency.setValueAtTime(150, now);
    kick.frequency.exponentialRampToValueAtTime(50, now + 0.1);
    kickGain.gain.setValueAtTime(0.12, now);
    kickGain.gain.linearRampToValueAtTime(0, now + 0.15);
    kick.start(now); kick.stop(now + 0.15);
  }, 400);
}

function stopBGM() {
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) stopBGM();
}

// ==================== 語音系統 ====================
let currentUtterance = null;

function speak(text, rate = 1.1, pitch = 1.0) {
  if (!soundEnabled) return;
  if (currentUtterance) window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-TW';
  utterance.rate = rate;
  utterance.pitch = pitch;
  utterance.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('TW'));
  if (zhVoice) utterance.voice = zhVoice;
  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

    correct: 2,
    detail: "共有 12 個長期合作夥伴，包括各類專業團體與基金會！"
  }
];

// ==================== 遊戲變數 ====================
const TOTAL_QUESTIONS = 15;
let gameQuestions = [];
let currentQuestion = 0;
let score = 0;
let timer = null;
let timeLeft = 15;
let answered = false;
let combo = 0;
let usedCorrectRoasts = [];
let usedWrongRoasts = [];

// 隨機打亂陣列
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 隨機打亂選項並更新正確答案索引
function shuffleOptions(question) {
  const options = question.options.map((opt, i) => ({ text: opt, isCorrect: i === question.correct }));
  const shuffled = shuffle(options);
  return {
    ...question,
    options: shuffled.map(o => o.text),
    correct: shuffled.findIndex(o => o.isCorrect)
  };
}

// 取得不重複的吐槽
function getUniqueRoast(roasts, usedList) {
  if (usedList.length >= roasts.length) usedList.length = 0;
  let available = roasts.filter((_, i) => !usedList.includes(i));
  const idx = Math.floor(Math.random() * available.length);
  const originalIdx = roasts.indexOf(available[idx]);
  usedList.push(originalIdx);
  return available[idx];
}

// ==================== 粒子效果 ====================
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.width = Math.random() * 10 + 5 + 'px';
    particle.style.height = particle.style.width;
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = Math.random() * 10 + 15 + 's';
    container.appendChild(particle);
  }
}

// ==================== 遊戲邏輯 ====================
function startGame() {
  initAudio();
  playSound('start');
  startBGM();
  
  // 隨機抽 15 題並打亂選項
  gameQuestions = shuffle(questionBank).slice(0, TOTAL_QUESTIONS).map(shuffleOptions);
  
  setTimeout(() => {
    speak("歡迎來到國教盟知識王！準備好了嗎？開始囉！", 1.1, 1.05);
  }, 200);
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').style.display = 'flex';
  document.getElementById('hostControls').style.display = 'flex';
  
  currentQuestion = 0;
  score = 0;
  combo = 0;
  usedCorrectRoasts = [];
  usedWrongRoasts = [];
  document.getElementById('score').textContent = '0';
  updateProgress();
  
  setTimeout(() => showQuestion(), 2000);
}

function updateProgress() {
  const progress = (currentQuestion / TOTAL_QUESTIONS) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
}

function showQuestion() {
  answered = false;
  const q = gameQuestions[currentQuestion];
  
  document.getElementById('questionNum').textContent = `第 ${currentQuestion + 1} / ${TOTAL_QUESTIONS} 題`;
  document.getElementById('category').textContent = q.category;
  document.getElementById('questionText').textContent = q.question;
  
  const optionsGrid = document.getElementById('optionsGrid');
  optionsGrid.innerHTML = '';
  
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optionsGrid.appendChild(btn);
  });
  
  document.getElementById('questionArea').style.display = 'flex';
  document.getElementById('answerReveal').style.display = 'none';
  
  timeLeft = 15;
  const timerText = document.getElementById('timer');
  const timerRing = document.getElementById('timerRing');
  const timerProgress = document.getElementById('timerProgress');
  
  timerText.textContent = timeLeft;
  timerText.className = 'timer-text';
  timerRing.className = 'timer-ring';
  timerProgress.style.strokeDashoffset = '0';
  
  const circumference = 163.36;
  
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    timerText.textContent = timeLeft;
    timerProgress.style.strokeDashoffset = circumference - (timeLeft / 15) * circumference;
    
    if (timeLeft <= 3) {
      timerRing.className = 'timer-ring danger';
      timerText.className = 'timer-text danger';
      playSound('tick');
    } else if (timeLeft <= 7) {
      timerRing.className = 'timer-ring warning';
    }
    
    if (timeLeft === 5 && !answered) {
      speak("快一點！", 1.3, 1.2);
    }
    
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) {
        playSound('wrong');
        combo = 0;
        revealAnswer(-1);
      }
    }
  }, 1000);
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  playSound('click');
  
  const q = gameQuestions[currentQuestion];
  const buttons = document.querySelectorAll('.option-btn');
  
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === index) btn.classList.add('wrong');
  });
  
  if (index === q.correct) {
    score += 1;
    combo += 1;
    document.getElementById('score').textContent = score;
    playSound('correct');
    if (combo >= 3) showCombo(combo);
  } else {
    combo = 0;
    playSound('wrong');
  }
  
  setTimeout(() => revealAnswer(index), 1200);
}

function showCombo(num) {
  const comboData = comboRoasts.find(c => c.count === num) || comboRoasts[comboRoasts.length - 1];
  
  const comboEl = document.createElement('div');
  comboEl.className = 'combo';
  comboEl.textContent = comboData.text;
  document.body.appendChild(comboEl);
  setTimeout(() => comboEl.remove(), 1000);
  
  speak(comboData.voice, 1.2, 1.2);
  showStarBurst();
}

function showStarBurst() {
  const container = document.createElement('div');
  container.className = 'stars-burst';
  const stars = ['⭐', '✨', '🌟', '💫'];
  for (let i = 0; i < 12; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.textContent = stars[Math.floor(Math.random() * stars.length)];
    const angle = (i / 12) * Math.PI * 2;
    const distance = 80 + Math.random() * 40;
    star.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
    star.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
    container.appendChild(star);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 1000);
}

function showFlash(type) {
  const flash = document.createElement('div');
  flash.className = 'screen-flash ' + type;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 500);
}

function shakeScreen() {
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 500);
}

function revealAnswer(selected) {
  const q = gameQuestions[currentQuestion];
  const isCorrect = selected === q.correct;
  const isTimeout = selected === -1;
  
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('answerReveal').style.display = 'flex';
  
  let icon, text, roast;
  
  if (isCorrect) {
    icon = '✅';
    text = '答對了！';
    const r = getUniqueRoast(correctRoasts, usedCorrectRoasts);
    roast = r.text;
    showFlash('success');
    setTimeout(() => speak("答對了！" + r.voice, 1.15, 1.1), 300);
  } else if (isTimeout) {
    icon = '⏰';
    text = '時間到！';
    const r = timeoutRoasts[Math.floor(Math.random() * timeoutRoasts.length)];
    roast = r.text;
    showFlash('warning');
    setTimeout(() => speak(r.voice, 1.1, 0.9), 300);
  } else {
    icon = '❌';
    text = '答錯了！';
    const r = getUniqueRoast(wrongRoasts, usedWrongRoasts);
    roast = r.text;
    showFlash('wrong');
    shakeScreen();
    setTimeout(() => speak("答錯了！" + r.voice, 1.1, 0.95), 300);
  }
  
  document.getElementById('revealIcon').textContent = icon;
  document.getElementById('revealText').textContent = text;
  document.getElementById('revealRoast').textContent = roast;
  document.getElementById('revealDetail').textContent = q.detail;
  
  document.querySelector('.next-btn').textContent = 
    currentQuestion === TOTAL_QUESTIONS - 1 ? '🏆 查看結果' : '下一題 →';
}

function nextQuestion() {
  playSound('click');
  currentQuestion++;
  updateProgress();
  
  if (currentQuestion >= TOTAL_QUESTIONS) {
    showEndScreen();
  } else {
    showQuestion();
  }
}

function showEndScreen() {

  document.getElementById('hostControls').style.display = 'none';

  document.getElementById('finalScore').textContent = `${score} / ${TOTAL_QUESTIONS}`;
  
  let message = '', icon = '🏆', voice = '';

  // 高分區：答對越多稱讚越浮誇

  } else if (score >= 14) {

    voice = '14題！你根本是秘書長等級的！差點滿分耶！太厲害了！';

  } else if (score >= 8) {

    voice = '8題！中上程度！是用心的會員！';
    icon = '🥈';
  // 低分區：答錯越多越搞笑吐槽
  } else if (score >= 6) {

function restartGame() {
  playSound('click');
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('progressBar').style.width = '0%';
}

function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const particles = [];
  const colors = ['#E86E4E', '#FFD700', '#10B981', '#3D4451', '#fff'];
  
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 10 + 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: Math.random() * 3 + 2,
      angle: Math.random() * Math.PI * 2,
      spin: Math.random() * 0.2 - 0.1
    });
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
      p.y += p.speed;
      p.x += Math.sin(p.angle) * 2;
      p.angle += p.spin;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
      if (p.y > canvas.height) particles.splice(i, 1);
    });
    if (particles.length > 0) requestAnimationFrame(animate);
  }
  animate();
}

// 鍵盤控制
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !answered && document.getElementById('gameScreen').style.display === 'flex') {
    e.preventDefault();
    answered = true;
    clearInterval(timer);
    const q = gameQuestions[currentQuestion];
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add('correct');
    });
    score += 1;
    combo += 1;
    document.getElementById('score').textContent = score;
    playSound('correct');
    if (combo >= 3) showCombo(combo);
    setTimeout(() => revealAnswer(q.correct), 800);
  }
  
  if (e.code === 'ArrowRight' && document.getElementById('answerReveal').style.display === 'flex') {
    nextQuestion();
  }
  
  if (e.code === 'KeyR') location.reload();
});

createParticles();
